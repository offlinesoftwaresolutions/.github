<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" fill="none">
  <defs>
    <linearGradient id="priceBg" x1="0" y1="0" x2="440" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="440" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/><stop offset="50%" stop-color="#818cf8"/><stop offset="100%" stop-color="#2ea44f"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ea44f"/><stop offset="100%" stop-color="#22863a"/>
    </linearGradient>
  </defs>
  <!-- outer glow border -->
  <rect x="0" y="0" width="440" height="360" rx="18" fill="url(#border)"/>
  <rect x="2" y="2" width="436" height="356" rx="16" fill="url(#priceBg)"/>
  <!-- price -->
  <text x="220" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#64748b" letter-spacing="3">SIMPLE PRICING</text>
  <text x="172" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#64748b" dy="-15">$</text>
  <text x="220" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="white">40</text>
  <text x="220" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">one-time in-app purchase</text>
  <!-- divider -->
  <line x1="120" y1="168" x2="320" y2="168" stroke="#1e3a5f" stroke-width="1"/>
  <!-- checklist -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#cbd5e1">
    <text x="140" y="200"><tspan fill="#4ade80" font-size="15">&#10003;</tspan>  All features included</text>
    <text x="140" y="228"><tspan fill="#4ade80" font-size="15">&#10003;</tspan>  Free updates forever</text>
    <text x="140" y="256"><tspan fill="#4ade80" font-size="15">&#10003;</tspan>  No subscription</text>
    <text x="140" y="284"><tspan fill="#4ade80" font-size="15">&#10003;</tspan>  No hidden fees</text>
  </g>
  <!-- CTA -->
  <a href="https://github.com/offlinesoftwaresolutions/eGate">
    <rect x="110" y="306" width="220" height="40" rx="20" fill="url(#btn)"/>
    <text x="220" y="332" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="white">Get Started  &#8594;</text>
  </a>
</svg>

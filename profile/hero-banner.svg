<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="320" rx="16" fill="url(#bg)"/>
  <!-- subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/><line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/><line x1="800" y1="0" x2="800" y2="320"/>
  </g>
  <!-- decorative circles -->
  <circle cx="780" cy="60" r="120" fill="#38bdf8" opacity="0.05"/>
  <circle cx="120" cy="260" r="90" fill="#818cf8" opacity="0.05"/>
  <!-- title -->
  <text x="450" y="95" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="white" filter="url(#glow)">eGate</text>
  <!-- subtitle -->
  <text x="450" y="140" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="url(#accent)">The Offline MDM for Android</text>
  <!-- tagline -->
  <text x="450" y="185" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#94a3b8">Take full control of your Android devices — no cloud, no recurring fees, no compromises.</text>
  <!-- CTA button -->
  <a href="https://github.com/offlinesoftwaresolutions/eGate">
    <rect x="325" y="215" width="250" height="50" rx="25" fill="#2ea44f"/>
    <rect x="325" y="215" width="250" height="50" rx="25" fill="white" opacity="0.08"/>
    <text x="450" y="247" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="white">Get eGate  &#8594;</text>
  </a>
  <!-- pills -->
  <rect x="175" y="282" width="150" height="26" rx="13" fill="#2ea44f" opacity="0.15"/>
  <text x="250" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#4ade80">$40 One-Time</text>
  <rect x="375" y="282" width="150" height="26" rx="13" fill="#3b82f6" opacity="0.15"/>
  <text x="450" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#60a5fa">No Subscription</text>
  <rect x="575" y="282" width="150" height="26" rx="13" fill="#8b5cf6" opacity="0.15"/>
  <text x="650" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#a78bfa">Free Updates Forever</text>
</svg>
